<app-modal [(visible)]="isVisible" maxWidth="420px">
  <div class="flex items-start">
    <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-red-50 dark:bg-red-500/10 sm:mx-0 sm:h-10 sm:w-10">
      <svg class="h-6 w-6 text-red-600 dark:text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>

    <div class="ml-4 text-left mt-1">
      <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 tracking-tight">
        {{ title }}
      </h3>
      <div class="mt-2">
        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
          {{ message }}
        </p>
      </div>
    </div>
  </div>

  <div class="mt-8 sm:flex sm:flex-row-reverse gap-3">
    <button (click)="onConfirm()" 
            type="button" 
            class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-2.5 bg-red-600 text-sm font-semibold text-white hover:bg-red-700 transition-colors sm:w-auto sm:text-sm">
      Sim, Excluir
    </button>
    <button (click)="onCancel()" 
            type="button" 
            class="mt-3 w-full inline-flex justify-center rounded-xl border border-slate-300 dark:border-slate-700 shadow-sm px-4 py-2.5 bg-white dark:bg-slate-800 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors sm:mt-0 sm:w-auto sm:text-sm">
      Cancelar
    </button>
  </div>
</app-modal>
