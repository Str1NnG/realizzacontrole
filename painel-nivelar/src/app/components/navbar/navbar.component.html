<nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-sm border-b border-slate-200 dark:border-slate-800 h-16 flex items-center justify-between px-6 flex-shrink-0 sticky top-0 z-30 transition-colors">
  
  <div class="text-xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-500" *ngIf="currentUser$ | async as user">
    {{ user?.nomeEmpresa || 'Realizza + Engenharia' }}
  </div>

  <div class="flex items-center gap-4">
    <button (click)="themeService.toggleTheme()" title="Alterar Tema" class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full p-2 transition-all hover:scale-105 active:scale-95">
      <svg *ngIf="!themeService.isDark()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
      <svg *ngIf="themeService.isDark()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
    </button>

    <div class="relative" *ngIf="currentUser$ | async as user">
      <button (click)="toggleProfileMenu()" class="w-9 h-9 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-900 ring-transparent hover:ring-blue-500 transition-all shadow-sm">
        <img [src]="user?.fotoPerfilUrl || 'https://ui-avatars.com/api/?name=' + (user?.nome?.charAt(0) || 'A') + '&background=0f172a&color=fff'" alt="Perfil" class="w-full h-full object-cover">
      </button>

      <div *ngIf="isProfileMenuOpen" class="absolute right-0 mt-3 w-56 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 py-2 z-50 transform origin-top-right transition-all">
        <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-700 mb-1">
          <p class="text-sm font-bold text-slate-800 dark:text-slate-100 truncate">{{ user.nome }}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 truncate">{{ user.cpf }}</p>
        </div>
        <a (click)="logout()" class="flex items-center gap-2 px-4 py-2 mt-1 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 cursor-pointer transition-colors font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          Sair do Sistema
        </a>
      </div>
    </div>
  </div>
</nav>
