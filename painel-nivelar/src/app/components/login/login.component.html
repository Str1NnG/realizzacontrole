<div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col justify-center items-center p-4">
  
  <div class="w-full max-w-md animate-fade-in">
    
    <div class="text-center mb-8">
      <img src="/logo_realizza.png" alt="Realizza Controle" class="mx-auto h-20 w-auto mb-4">
      <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">
        Realizza<span class="text-blue-600">Controle</span>
      </h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Gestão inteligente para engenharia</p>
    </div>

    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] shadow-2xl p-8 md:p-10">
      
      <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <div class="space-y-2">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Documento (CPF)</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <input type="text" maxlength="14" name="cpf" [ngModel]="cpf" (input)="onCpfInput($event)" required placeholder="000.000.000-00"
                   class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-mono">
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Senha de Acesso</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <input [type]="showPassword ? 'text' : 'password'" name="senha" [(ngModel)]="senha" required placeholder="••••••••"
                   class="w-full pl-12 pr-12 py-4 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            
            <button type="button" (click)="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-blue-500 transition-colors">
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.112-3.875m9.76 9.76a9.965 9.965 0 01-2.433-2.312m2.433 2.312l4.243 4.243M12 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21m-6.125-6.125l-1.5-1.5m-4.5-4.5l-1.5-1.5M10 10a3 3 0 104.243 4.243" /></svg>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="!loginForm.form.valid || isLoading"
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold uppercase tracking-widest rounded-2xl shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-3">
          <span *ngIf="!isLoading">Acessar Painel</span>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>

      </form>
    </div>

    <div class="mt-12 text-center opacity-60">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Desenvolvido por</p>
      <p class="text-sm font-black text-slate-800 dark:text-slate-200">Kodar<span class="text-blue-600">Softwares</span></p>
    </div>

  </div>
</div>
