<div class="bg-slate-50 dark:bg-slate-900 min-h-screen font-sans p-4 md:p-6">
  <div class="max-w-screen-lg mx-auto space-y-6">

    <div>
      <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-200 tracking-tight">Configurações do Sistema</h1>
      <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Gerencie as preferências da empresa e do seu perfil</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 p-6">
        <h2 class="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">Dados da Empresa</h2>
        
        <form [formGroup]="empresaForm" (ngSubmit)="salvarEmpresa()" class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Nome da Empresa</label>
            <input type="text" formControlName="nomeEmpresa" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">CNPJ</label>
            <input type="text" formControlName="cnpj" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Valor da Hora Padrão (R$)</label>
            <input type="number" formControlName="valorHoraPadrao" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            <p class="text-[10px] text-slate-400 mt-1">Usado quando o serviço não tem um cliente específico selecionado.</p>
          </div>
          <div class="pt-2">
            <button type="submit" [disabled]="isLoading" class="w-full py-2 bg-blue-600 text-white rounded-lg font-bold text-xs shadow-md hover:bg-blue-700 transition-colors flex justify-center items-center gap-2">
              <svg *ngIf="isLoading" class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Salvar Empresa
            </button>
          </div>
        </form>
      </div>

      <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 p-6">
        <h2 class="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">Meu Perfil</h2>
        
        <form [formGroup]="perfilForm" (ngSubmit)="salvarPerfil()" class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Nome de Usuário</label>
            <input type="text" formControlName="nome" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">E-mail</label>
            <input type="email" formControlName="email" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Senha Atual</label>
              <input type="password" formControlName="senhaAtual" placeholder="••••••••" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Nova Senha</label>
              <input type="password" formControlName="novaSenha" placeholder="••••••••" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
          </div>
          <div class="pt-2">
            <button type="submit" [disabled]="isLoading" class="w-full py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg font-bold text-xs shadow-md hover:bg-slate-700 transition-colors flex justify-center items-center gap-2">
              <svg *ngIf="isLoading" class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Atualizar Perfil
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
